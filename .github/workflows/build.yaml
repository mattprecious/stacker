name: build

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - 'main'
    tags-ignore:
      - '**'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  build_deps:
    strategy:
      fail-fast: false
      matrix:
        include:
          #- os: ubuntu-latest
          #  cmake-arch: x86_64
          #  openssl-arch: linux-x86_64
          #  task: linkReleaseExecutableLinuxX64
          - os: macOS-latest
            cmake-arch: x86_64
            openssl-arch: darwin64-x86_64-cc
            task: linkReleaseExecutableMacosX64
          - os: macOS-latest
            cmake-arch: arm64
            openssl-arch: darwin64-arm64-cc
            task: linkReleaseExecutableMacosArm64
          # TODO: build on 'windows-latest'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Install dependencies
        if: matrix.os == 'macOS-latest'
        run: brew install coreutils

      - name: Build native libraries
        run: ./build-deps.sh -a ${{ matrix.arch }} -c ${{ matrix.cmake-arch }} -o ${{ matrix.openssl-arch }}

      - run: ./gradlew ${{ matrix.task }}

      - name: Upload distribution
        uses: actions/upload-artifact@v3
        with:
          name: bin
          path: build/bin
          if-no-files-found: error
