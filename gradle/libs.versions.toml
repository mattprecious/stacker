[versions]
kotlin = "1.9.20"
sqldelight = "2.0.0"

[libraries]
assertk = "com.willowtreeapps.assertk:assertk:0.27.0"
clikt = "com.github.ajalt.clikt:clikt:4.2.1"
kotlin-serialization-json = "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.0"
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test" }
okio = "com.squareup.okio:okio:3.6.0"
sqldelight-driver = { module = "app.cash.sqldelight:native-driver", version.ref = "sqldelight" }
sqldelight-dialect = { module = "app.cash.sqldelight:sqlite-3-38-dialect", version.ref = "sqldelight" }

[plugins]
spotless = "com.diffplug.spotless:6.22.0"
sqldelight = { id = "app.cash.sqldelight", version.ref = "sqldelight" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-plugin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
